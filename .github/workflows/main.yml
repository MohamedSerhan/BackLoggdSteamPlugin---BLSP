name: Weekly Report Generation

on:
  schedule:
    # Runs at 12:00 AM UTC every Monday
    - cron: '0 0 * * 1'

  # Manual trigger: Allows you to run the workflow manually
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22' # Use your project's Node.js version

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: npm install

      # Step 3.5: Start the API server
      - name: Start API Server
        env:
          STEAM_ID: ${{ secrets.STEAM_ID }}
          BACKLOGGD_USERNAME: ${{ secrets.BACKLOGGD_USERNAME }}
          BACKLOGGD_DOMAIN: ${{ secrets.BACKLOGGD_DOMAIN }}
        run: |
          # Create .env file for API server
          echo "BACKLOGGD_USERNAME=${{ secrets.BACKLOGGD_USERNAME }}" > .env
          echo "BACKLOGGD_DOMAIN=http://127.0.0.1:8080" >> .env
          echo "NODE_ENV=production" >> .env
          
          # Start the API server in the background
          npm run start:api &
          API_PID=$!
          echo "API_PID=$API_PID" >> $GITHUB_ENV
          
          # Wait for the API server to start
          sleep 10
          
          # Verify the API server is running and responding
          if ! kill -0 $API_PID 2>/dev/null; then
            echo "❌ API server failed to start"
            exit 1
          fi
          
          # Test if the API server is actually responding
          if ! curl -s http://127.0.0.1:8080 > /dev/null; then
            echo "❌ API server is running but not responding"
            kill $API_PID 2>/dev/null || true
            exit 1
          fi
          
          echo "✅ API server started successfully and is responding"

      # Step 4: Run the script
      - name: Run Report Script
        env:
          STEAM_ID: ${{ secrets.STEAM_ID }}
          BACKLOGGD_USERNAME: ${{ secrets.BACKLOGGD_USERNAME }}
          BACKLOGGD_DOMAIN: ${{ secrets.BACKLOGGD_DOMAIN }}
        run: |
          # Run the wishlist comparison script (exits after completion)
          npm run generate-report
          
          # Verify the report was generated
          if [ ! -f "wishlistReport.html" ]; then
            echo "❌ Wishlist report was not generated successfully"
            exit 1
          fi
          
          echo "✅ Wishlist report generated successfully"

      # Step 5: Stop API server
      - name: Stop API Server
        if: always()
        run: |
          # Stop the API server if it was started
          if [ ! -z "$API_PID" ]; then
            echo "Stopping API server (PID: $API_PID)"
            kill $API_PID 2>/dev/null || true
            sleep 2
            # Force kill if still running
            kill -9 $API_PID 2>/dev/null || true
            echo "✅ API server stopped"
          else
            echo "ℹ️ No API server to stop"
          fi

      # Step 6: Log completion status
      - name: Log Completion Status
        run: |
          echo "✅ Wishlist report generation completed successfully!"
          echo "📄 Report available at: wishlistReport.html"
          echo "📦 Artifacts uploaded to GitHub Actions"
          echo "🌐 GitHub Pages deployment: https://yourusername.github.io/yourrepository/reports/wishlistReport.html"
          echo "⏰ Next scheduled run: Next Monday at 12:00 AM UTC"
